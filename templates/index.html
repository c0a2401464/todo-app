<!DOCTYPE html>
<html>
<head>
    <title>ToDo App</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

    <div class="container">

        <h1>ToDoアプリ</h1>

        <form method="POST">

            <input type="text" name="task">

            <button type="submit">
                追加
            </button>

        </form>

        <ul>

            {% for task in tasks %}

                <li>

                    {{ task[1] }}

                    <a href="/delete/{{ task[0] }}">
                        削除
                    </a>

                </li>

            {% endfor %}

        </ul>

    </div>

</body>
</html>
